# Scheduled health check - fails if worker is down
# Add alerts via GitHub notifications or external monitoring (UptimeRobot, etc.)
# For your own fork: set repo secret HEALTH_CHECK_URL to your worker URL, or edit the URL below.
name: Health Check

on:
  schedule:
    - cron: '*/30 * * * *'  # Every 30 minutes
  workflow_dispatch: {}

jobs:
  health:
    runs-on: ubuntu-latest
    steps:
      - name: Check health endpoint
        env:
          HEALTH_CHECK_URL: ${{ secrets.HEALTH_CHECK_URL }}
        run: |
          BASE="${HEALTH_CHECK_URL:-https://website-scanner.austin-gilbert.workers.dev}"
          RESP=$(curl -sf --max-time 15 "$BASE/health")
          if echo "$RESP" | grep -q '"ok":true'; then
            echo "Health check OK"
          else
            echo "Health check failed: $RESP"
            exit 1
          fi
