openapi: 3.1.0
info:
  title: Website Scanner API (Actions)
  version: 1.0.0
  description: Minimal OpenAPI schema optimized for ChatGPT Actions parsing.
servers:
  - url: https://website-scanner.austin-gilbert.workers.dev

paths:
  /health:
    get:
      operationId: healthCheck
      summary: Health check
      description: Returns service health.
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                required:
                  - ok

  /scan:
    get:
      operationId: scanHomepage
      summary: Scan a website homepage (deep dive)
      description: Deep scan a homepage (tech stack, AI readiness, business scale, performance).
      parameters:
        - name: url
          in: query
          required: true
          description: Target URL (http/https).
          schema:
            type: string
            format: uri
      responses:
        "200":
          description: Successful scan
          content:
            application/json:
              schema:
                type: object
                properties:
                  input:
                    type: string
                  finalUrl:
                    type: string
                  status:
                    type: integer
                  headers:
                    type: object
                    additionalProperties:
                      type: string
                  generator:
                    anyOf:
                      - type: string
                      - type: "null"
                  htmlSnippet:
                    type: string
                  scriptSrcs:
                    type: array
                    items:
                      type: string
                  linkHrefs:
                    type: array
                    items:
                      type: string
                  robotsUrl:
                    anyOf:
                      - type: string
                      - type: "null"
                  robotsPresent:
                    type: boolean
                  sitemapChecks:
                    type: array
                    items:
                      type: object
                      properties:
                        url:
                          type: string
                        ok:
                          type: boolean
                        status:
                          type: integer
                        contentType:
                          type: string
                        snippet:
                          type: string
                      required:
                        - url
                        - ok
                      additionalProperties: true
                  technologyStack:
                    type: object
                    properties: {}
                    additionalProperties: true
                  businessUnits:
                    type: object
                    properties: {}
                    additionalProperties: true
                  digitalGoals:
                    type: object
                    properties: {}
                    additionalProperties: true
                  jobAnalysis:
                    type: object
                    properties: {}
                    additionalProperties: true
                  aiReadiness:
                    type: object
                    properties: {}
                    additionalProperties: true
                  businessScale:
                    type: object
                    properties: {}
                    additionalProperties: true
                  performance:
                    type: object
                    properties: {}
                    additionalProperties: true
                  fetchedAt:
                    type: string
                    format: date-time
                required:
                  - input
                  - finalUrl
                  - status
                  - fetchedAt
                additionalProperties: true
        "400":
          description: Bad request (missing/invalid/blocked URL)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    anyOf:
                      - type: string
                      - type: "null"
                required:
                  - error
        "500":
          description: Internal server error or fetch failure
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    anyOf:
                      - type: string
                      - type: "null"
                  input:
                    anyOf:
                      - type: string
                      - type: "null"
                  fetchedAt:
                    type: string
                    format: date-time
                required:
                  - error

  /scan-batch:
    get:
      operationId: scanBatchAccounts
      summary: Scan multiple websites (batch / stack-rank)
      description: Batch scan is LIGHT by default to avoid Cloudflare 1102. Use /scan for deep dives.
      parameters:
        - name: urls
          in: query
          required: true
          description: Comma-separated URLs (mode=light max 10, mode=full max 3).
          schema:
            type: string
        - name: mode
          in: query
          required: false
          description: light=single fetch per URL (default). full=heavier, smaller batch.
          schema:
            type: string
            enum: [light, full]
            default: light
        - name: includeFullData
          in: query
          required: false
          description: Include full per-URL payloads in batch results (larger response).
          schema:
            type: boolean
            default: false
        - name: includeHtmlSnippet
          in: query
          required: false
          description: Include htmlSnippet in batch results (larger response).
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Successful batch scan
          content:
            application/json:
              schema:
                type: object
                properties:
                  summary:
                    type: object
                    properties: {}
                    additionalProperties: true
                  results:
                    type: array
                    items:
                      type: object
                      properties: {}
                      additionalProperties: true
                  failed:
                    type: array
                    items:
                      type: object
                      properties:
                        url:
                          type: string
                        error:
                          type: string
                      required:
                        - url
                        - error
                      additionalProperties: true
                  scannedAt:
                    type: string
                    format: date-time
                required:
                  - summary
                  - results
                  - failed
                  - scannedAt
        "400":
          description: Bad request (invalid URLs / too many URLs)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                required:
                  - error
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                required:
                  - error


