# OpenAPI schema for Custom GPT Actions (max 30 operations).
# Use this file when configuring your Custom GPT; the full openapi.yaml exceeds the 30-op limit.
openapi: 3.1.0
info:
  title: Website Scanner API (GPT)
  version: 1.0.0
  description: Website scanner and sales intelligence API — 30 operations for Custom GPT.

servers:
  - url: https://website-scanner.austin-gilbert.workers.dev

components:
  securitySchemes:
    MoltApiKey:
      type: apiKey
      in: header
      name: Authorization
      description: "Bearer token. In Custom GPT use Authentication > API Key > Bearer with MOLT_API_KEY."
  
  schemas:
    GenericResponse:
      type: object
      properties:
        ok:
          type: boolean
        data:
          type: object
        error:
          type: string
      additionalProperties: true

paths:
  /memory:
    get:
      operationId: memoryRecall
      summary: Recall everything the system knows about entities (CALL THIS FIRST ON EVERY TURN)
      description: |
        Compare notes before responding. Pass domains mentioned by the user, the
        thread ID, or a freeform query. Returns account intelligence, recent
        interactions, follow-ups, and thread history. The "brief" field is a
        pre-formatted text summary you can read at a glance.
      parameters:
        - name: domains
          in: query
          schema: { type: string }
          description: Comma-separated domains (e.g. "acme.com,rival.io")
        - name: q
          in: query
          schema: { type: string }
          description: Freeform prompt — domains are auto-extracted
        - name: threadId
          in: query
          schema: { type: string }
          description: Thread or session ID for continuity across turns
        - name: limit
          in: query
          schema: { type: integer, default: 10 }
      responses:
        "200":
          description: Recall payload with structured `recall` and human-readable `brief`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
    post:
      operationId: memorySync
      summary: Store this exchange AND recall context in one call
      description: |
        After composing your response, call this with the user's message and
        your summary. Returns the same recall payload as GET so you stay
        up-to-date for the next turn.  This replaces the old
        storeData(type=interaction) + queryData(type=context) two-call pattern.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userMessage]
              properties:
                userMessage:
                  type: string
                  description: What the user said this turn
                assistantMessage:
                  type: string
                  description: Your response summary (2-3 sentences)
                domains:
                  type: array
                  items: { type: string }
                  description: Domains discussed (auto-extracted from userMessage if omitted)
                threadId:
                  type: string
                  description: Thread / conversation ID for session continuity
                tags:
                  type: array
                  items: { type: string }
                  description: Context tags (tech, competitor, research, person, etc.)
                importance:
                  type: number
                  default: 0.6
                followUpNeeded:
                  type: boolean
                  default: false
                followUpNotes:
                  type: string
      responses:
        "200":
          description: Stored confirmation + full recall payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'

  /scan:
    get:
      operationId: scanHomepage
      summary: Scan a website homepage
      description: Deep scan for full tech stack (17 categories), AI readiness, and performance. Auto-saves to Sanity. Detects CMS, frameworks, analytics, e-commerce, hosting, auth, search, monitoring, payments, marketing, chat, and more.
      parameters:
        - name: url
          in: query
          required: true
          schema: { type: string, format: uri }
      responses:
        "200":
          description: Scan result with full technology stack
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'

  /scan-batch:
    get:
      operationId: scanBatchAccounts
      summary: Batch scan multiple URLs
      description: Comma-separated urls. mode=light (default) or full. Rank by opportunity.
      parameters:
        - name: urls
          in: query
          required: true
          schema: { type: string }
        - name: mode
          in: query
          schema: { type: string, enum: [light, full], default: light }
      responses:
        "200":
          description: Batch results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'

  /linkedin-profile:
    post:
      operationId: scanLinkedInProfile
      summary: Scan LinkedIn profile
      description: Provide profileUrl or profileHtml/profileText. May be blocked by LinkedIn.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                profileUrl: { type: string, description: "LinkedIn profile URL" }
                profileHtml: { type: string }
                profileText: { type: string }
      responses:
        "200":
          description: Profile analysis
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'

  /extract:
    post:
      operationId: extractEvidence
      summary: Extract evidence pack from URL(s)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                url: { type: string }
                urls: { type: array, items: { type: string } }
      responses:
        "200":
          description: Evidence pack
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'

  /search:
    post:
      operationId: searchWeb
      summary: Web search
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query]
              properties:
                query: { type: string, description: "Search query text" }
                limit: { type: integer }
                recencyDays: { type: integer }
                mode: { type: string, enum: [fast, thorough], default: fast }
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'

  /discover:
    post:
      operationId: discoverPages
      summary: Discover pages on a site
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                url: { type: string }
      responses:
        "200":
          description: Discovered URLs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'

  /crawl/smart:
    post:
      operationId: smartCrawl
      summary: Smart crawl from seed URL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [baseUrl]
              properties:
                baseUrl: { type: string, description: "Seed URL to crawl from" }
                maxPages: { type: integer }
                targetPages: { type: array, items: { type: string } }
      responses:
        "200":
          description: Crawl results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'

  /brief:
    post:
      operationId: generateBrief
      summary: Generate research brief
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [companyOrSite]
              properties:
                companyOrSite: { type: string, description: "Company name, domain, or URL to generate brief for" }
                seedUrl: { type: string }
                query: { type: string }
      responses:
        "200":
          description: Brief
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'

  /research/complete:
    post:
      operationId: researchComplete
      summary: One-click complete research
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [input]
              properties:
                input: { type: string, description: "Company name, domain, or URL" }
                inputType: { type: string, enum: [auto, url, domain, company], default: auto }
                includeCompetitors: { type: boolean, default: true }
                mode: { type: string, enum: [fast, deep], default: fast }
      responses:
        "200":
          description: Research result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'

  /research/quick:
    get:
      operationId: researchQuick
      summary: Quick lookup for an account (provide at least one identifier)
      parameters:
        - name: domain
          in: query
          schema: { type: string }
          description: "Company domain (e.g. cloudflare.com)"
        - name: accountKey
          in: query
          schema: { type: string }
          description: "Sanity account key"
        - name: url
          in: query
          schema: { type: string }
          description: "Company URL"
      responses:
        "200":
          description: Quick result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'

  /research/intelligence:
    get:
      operationId: researchIntelligence
      summary: Get full intelligence for account
      parameters:
        - name: accountKey
          in: query
          required: true
          schema: { type: string }
          description: "Sanity account key (required)"
      responses:
        "200":
          description: Intelligence payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'

  /orchestrate:
    post:
      operationId: orchestrateAccount
      summary: Run full orchestration pipeline
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [input]
              properties:
                input: { type: string, description: "Company name, domain, or URL" }
                inputType: { type: string, enum: [url, domain, company], default: url }
                runMode: { type: string, enum: [queue, sync], default: queue }
      responses:
        "200":
          description: Orchestration result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'

  /orchestrate/status:
    get:
      operationId: orchestrateStatus
      summary: Get orchestration status
      parameters:
        - name: jobId
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'

  /person/brief:
    post:
      operationId: generatePersonBrief
      summary: Generate person intelligence brief
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string, description: "Person's full name" }
                companyName: { type: string, description: "Company name" }
                companyDomain: { type: string, description: "Company domain" }
                profileUrl: { type: string, description: "LinkedIn profile URL" }
                mode: { type: string, enum: [fast, deep], default: fast }
      responses:
        "200":
          description: Person brief
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'

  /verify:
    post:
      operationId: verifyClaims
      summary: Verify claims against sources
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                claims: { type: array, items: { type: object } }
                sources: { type: array, items: { type: string } }
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'

  /store/{type}:
    post:
      operationId: storeData
      summary: Store data in Sanity (scan, brief, interaction, etc.)
      description: "type is one of: scan, linkedin, evidence, brief, person, account, interaction, session, learning. Body must include account (with canonicalUrl or domain) and data."
      parameters:
        - name: type
          in: path
          required: true
          schema: { type: string, enum: [scan, linkedin, evidence, brief, person, account, interaction, session, learning] }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [account, data]
              properties:
                account:
                  type: object
                  properties:
                    canonicalUrl: { type: string, description: "Account URL (or provide domain)" }
                    domain: { type: string, description: "Account domain (alternative to canonicalUrl)" }
                    companyName: { type: string }
                data:
                  type: object
                  description: "For interaction: { userPrompt, gptResponse, sessionId? }. For others: payload object."
                meta:
                  type: object
      responses:
        "200":
          description: Stored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'

  /query:
    get:
      operationId: queryData
      summary: Query Sanity or get context (recall/summarize)
      description: type=context with accountKey/domain, contextType=all, fullInsights=true for recall.
      parameters:
        - name: type
          in: query
          schema: { type: string }
        - name: accountKey
          in: query
          schema: { type: string }
        - name: domain
          in: query
          schema: { type: string }
        - name: contextType
          in: query
          schema: { type: string, enum: [summary, interactions, learnings, followUps, all] }
        - name: contextLimit
          in: query
          schema: { type: integer }
        - name: fullInsights
          in: query
          schema: { type: boolean }
        - name: q
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Query or context result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'

  /update/{docId}:
    put:
      operationId: updateDocument
      summary: Update a Sanity document
      parameters:
        - name: docId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
                $ref: '#/components/schemas/GenericResponse'
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
    delete:
      operationId: deleteDocument
      summary: Delete a Sanity document
      parameters:
        - name: docId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'

  /osint/queue:
    post:
      operationId: queueOsintJob
      summary: Queue OSINT year-ahead intelligence job
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [url]
              properties:
                url: { type: string, description: "Company URL to research" }
                companyName: { type: string }
                mode: { type: string, enum: [year_ahead, quick], default: year_ahead }
      responses:
        "200":
          description: Job queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'

  /osint/status:
    get:
      operationId: getOsintStatus
      summary: Get OSINT job status
      parameters:
        - name: accountKey
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'

  /osint/report:
    get:
      operationId: getOsintReport
      summary: Get OSINT report
      parameters:
        - name: accountKey
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'

  /competitors/research:
    post:
      operationId: competitorsResearch
      summary: Research competitors for an account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                accountKey: { type: string }
                domain: { type: string }
      responses:
        "200":
          description: Competitor research
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'

  /competitors/opportunities:
    get:
      operationId: competitorOpportunities
      summary: Get displacement opportunities
      parameters:
        - name: accountKey
          in: query
          required: true
          schema: { type: string }
          description: "Account key to find displacement opportunities for"
      responses:
        "200":
          description: Opportunities
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'

  /enrich/run:
    post:
      operationId: enrichRun
      summary: Trigger enrichment for an account
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                canonicalUrl: { type: string, description: "Account URL (or use url)" }
                url: { type: string, description: "Alternative to canonicalUrl" }
                accountKey: { type: string }
      responses:
        "200":
          description: Enrichment triggered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'

  /enrich/status:
    get:
      operationId: enrichStatus
      summary: Get enrichment pipeline status
      parameters:
        - name: accountKey
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'

  /enrich/queue:
    post:
      operationId: enrichQueue
      summary: Queue enrichment job
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                canonicalUrl: { type: string, description: "Account URL (or use url)" }
                url: { type: string, description: "Alternative to canonicalUrl" }
                accountKey: { type: string }
      responses:
        "200":
          description: Queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'

  /molt/run:
    post:
      operationId: moltRun
      summary: Run MoltBot orchestration
      security:
        - MoltApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [requestText]
              properties:
                requestText: { type: string }
      responses:
        "200":
          description: MoltBot result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'

